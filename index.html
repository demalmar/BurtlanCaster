<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player & Cast</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .video-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input[type="file"]::file-selector-button {
            background: #3b82f6;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            margin-right: 1rem;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full space-y-6">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold tracking-tight text-white">Video Cast</h1>
            <p class="text-slate-400">Carga un video local para reproducir o transmitir</p>
        </header>

        <!-- Área del Reproductor -->
        <div class="video-container bg-black rounded-2xl overflow-hidden border border-slate-800">
            <video id="myVideo" class="w-full aspect-video" controls>
                <source id="videoSource" src="https://www.rmp-streaming.com/media/big-buck-bunny-360p.mp4" type="video/mp4">
                Tu navegador no soporta el tag de video.
            </video>
        </div>

        <!-- Controles -->
        <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 backdrop-blur-sm space-y-4">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex flex-col gap-2 w-full md:w-auto">
                    <label class="text-sm font-medium text-slate-400">Seleccionar Video Local:</label>
                    <input type="file" id="fileInput" accept="video/*" class="text-sm text-slate-400">
                </div>
                
                <div class="flex gap-3">
                    <button id="castme" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-all shadow-lg shadow-blue-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.92-11-11-11zM21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                        Transmitir
                    </button>
                    <button id="stop" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-6 py-2.5 rounded-xl font-semibold transition-all border border-red-500/20">
                        Detener Cast
                    </button>
                </div>
            </div>

            <!-- Status Box -->
            <div id="statusBox" class="text-xs font-mono text-slate-500 bg-black/30 p-3 rounded-lg border border-white/5 h-24 overflow-y-auto">
                > Sistema listo. Esperando inicialización de Chromecast...
            </div>
        </div>
    </div>

    <script>
        let currentSession = null;
        let currentMedia = null;
        const statusBox = document.getElementById('statusBox');
        const videoElement = document.getElementById('myVideo');
        const fileInput = document.getElementById('fileInput');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            statusBox.innerHTML += `<br> [${time}] ${msg}`;
            statusBox.scrollTop = statusBox.scrollHeight;
        }

        // --- Manejo de Video Local ---
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                videoElement.src = fileURL;
                videoElement.load();
                log(`Video local cargado: ${file.name}`);
            }
        });

        // --- Inicialización de Chromecast ---
        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) {
                initializeCastApi();
            } else {
                log("Google Cast SDK no disponible.");
            }
        };

        function initializeCastApi() {
            const sessionRequest = new chrome.cast.SessionRequest(chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID);
            const apiConfig = new chrome.cast.ApiConfig(
                sessionRequest,
                sessionListener,
                receiverListener
            );
            chrome.cast.initialize(apiConfig, onInitSuccess, onInitError);
        }

        function sessionListener(e) {
            currentSession = e;
            log("Sesión recuperada.");
        }

        function receiverListener(e) {
            if (e === chrome.cast.ReceiverAvailability.AVAILABLE) {
                log("Chromecast encontrado en la red.");
            } else {
                log("No se encontraron dispositivos Chromecast.");
            }
        }

        function onInitSuccess() { log("SDK inicializado correctamente."); }
        function onInitError(e) { log("Error al inicializar SDK: " + JSON.stringify(e)); }

        // --- Acciones de Cast ---
        document.getElementById('castme').onclick = function() {
            if (!currentSession) {
                chrome.cast.requestSession(onRequestSessionSuccess, onLaunchError);
            } else {
                loadMedia();
            }
        };

        function onRequestSessionSuccess(e) {
            currentSession = e;
            log("Sesión iniciada: " + e.sessionId);
            loadMedia();
        }

        function onLaunchError(e) {
            log("Error al conectar: " + JSON.stringify(e));
        }

        function loadMedia() {
            if (!currentSession) return;

            const mediaSrc = videoElement.src;
            
            // Advertencia sobre blobs locales
            if (mediaSrc.startsWith('blob:')) {
                log("Aviso: Los videos 'blob:' locales pueden no funcionar en Chromecast si el dispositivo no tiene acceso al servidor local.");
            }

            const mediaInfo = new chrome.cast.media.MediaInfo(mediaSrc, 'video/mp4');
            mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
            mediaInfo.metadata.title = fileInput.files[0] ? fileInput.files[0].name : "Video Streaming";

            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            request.autoplay = true;

            currentSession.loadMedia(request, 
                (media) => {
                    currentMedia = media;
                    log("Video enviado correctamente al Chromecast.");
                }, 
                (err) => {
                    log("Error al cargar media: " + JSON.stringify(err));
                }
            );
        }

        document.getElementById('stop').onclick = function() {
            if (currentSession) {
                currentSession.stop(() => {
                    log("Transmisión detenida.");
                    currentSession = null;
                }, () => {
                    log("Error al detener la aplicación.");
                });
            }
        };
    </script>
</body>
</html>
